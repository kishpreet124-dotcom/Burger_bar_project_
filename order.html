<!DOCTYPE html>
<html>
<head>
<title>Order Now - Burger King</title>
</head>

<body style="margin:0; font-family:Arial; background-color:#FFF8DC;">

<!-- Header -->
<header style="background-color:#8B0000; color:white; text-align:center; padding:25px;">
<h1 style="font-size:50px;"><u> Order Now</u></h1>
<p style="font-size:22px;">Fresh Food | Fast Delivery | Best Taste</p>
</header>

<!-- Order Form -->

<section style="padding:40px;">

<center>

<form style="width:750px; background:white; border:4px solid #8B0000; border-radius:20px; padding:30px;">

<h2 style="color:#8B0000;">Place Your Order</h2>

<hr>

<label><b>Full Name</b></label><br><br>
<input type="text" placeholder="Enter Your Name"
style="width:95%; padding:12px; font-size:18px; align:left"><br><br>

<label><b>Mobile Number</b></label><br><br>
<input type="tel" placeholder="Enter Mobile Number"
style="width:95%; padding:12px; font-size:18px;"><br><br>

<label><b>Email Address</b></label><br><br>
<input type="email" placeholder="Enter Email"
style="width:95%; padding:12px; font-size:18px;"><br><br>

<label><b>Delivery Address</b></label><br><br>
<textarea rows="4"
style="width:95%; font-size:18px;"
placeholder="Enter Full Address"></textarea><br><br>

<label><b>Food Selection</b></label><br><br>

<select style="width:95%; padding:12px; font-size:18px;">

<option>Select Your Favorite Meal</option>

<option>Whopper Burger - ₹199</option>
<option>Cheese Burger - ₹179</option>
<option>Veg Burger - ₹149</option>
<option>Chicken Burger - ₹229</option>
<option>Double Patty Burger - ₹269</option>
<option>Paneer Burger - ₹189</option>
<option>BBQ Burger - ₹249</option>
<option>Crispy Chicken Burger - ₹239</option>
<option>Mexican Burger - ₹259</option>
<option>Spicy Burger - ₹219</option>

<option>White Sauce Pasta - ₹249</option>
<option>Red Sauce Pasta - ₹229</option>

<option>Margherita Pizza - ₹299</option>
<option>Pepperoni Pizza - ₹399</option>

<option>French Fries - ₹119</option>
<option>Chicken Nuggets - ₹189</option>
<option>Chicken Wrap - ₹199</option>
<option>Veg Salad - ₹149</option>

<option>Chocolate Ice Cream - ₹99</option>

<option>Chocolate Shake - ₹199</option>
<option>Strawberry Shake - ₹189</option>
<option>Oreo Shake - ₹229</option>
<option>Mango Smoothie - ₹179</option>
<option>Mint Mojito - ₹149</option>
<option>Cold Coffee - ₹149</option>

</select>

<br><br>

<label><b>Quantity</b></label><br><br>

<input type="number" min="1" max="20"
style="width:95%; padding:12px; font-size:18px;"
placeholder="Enter Quantity"><br><br>

<label><b>Payment Method</b></label><br><br>

<input type="radio" name="pay"> Cash on Delivery

<input type="radio" name="pay"> UPI

<input type="radio" name="pay"> Credit Card

<input type="radio" name="pay"> Debit Card

<br><br>

<label><b>Special Instructions</b></label><br><br>

<textarea rows="5"
style="width:95%; font-size:18px;"
placeholder="Any Extra Instructions..."></textarea>

<br><br>

<input type="checkbox">
I confirm my order details are correct.

<br><br>

<input type="submit" value=" Place Order"
style="background-color:#8B0000; color:white; padding:15px 40px; font-size:22px; border:none; border-radius:10px; cursor:pointer;">

<input type="reset" value="Reset"
style="background-color:gray; color:white; padding:15px 40px; font-size:22px; border:none; border-radius:10px; cursor:pointer;">

</form>

</center>

</section>


</body>
</html>
